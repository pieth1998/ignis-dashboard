<!DOCTYPE html>
  <html lang="nl">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ignis Dashboard</title>
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:#1e293b;padding:20px 24px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:12px}
.header h1{font-size:1.4rem;font-weight:700;color:#f1f5f9}
.header span{background:#3b82f6;color:#fff;font-size:.75rem;padding:3px 10px;border-radius:99px}
.controls{padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}
.controls input,.controls select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:.9rem}
.controls input{flex:1;min-width:200px}
.stats{padding:16px 24px;display:flex;gap:16px;flex-wrap:wrap}
.stat{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 20px;text-align:center}
.stat .num{font-size:1.6rem;font-weight:700;color:#3b82f6}
.stat .lbl{font-size:.75rem;color:#94a3b8;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:0 24px 24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;transition:border-color .2s}
.card:hover{border-color:#3b82f6}
  .card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:.7rem;padding:3px 8px;border-radius:99px;font-weight:600}
.tag.nieuw{background:#166534;color:#bbf7d0}
.tag.schade{background:#7f1d1d;color:#fca5a5}
.tag.marge{background:#1e3a5f;color:#93c5fd}
.tag.btw{background:#3b1f6e;color:#c4b5fd}
.tag.particulier{background:#064e3b;color:#6ee7b7}
.tag.dealer{background:#1c1917;color:#a8a29e}
.card h3{font-size:1rem;font-weight:600;color:#f1f5f9;margin-bottom:4px}
.card .sub{font-size:.8rem;color:#94a3b8;margin-bottom:10px}
.card .info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.card .info-item{background:#0f172a;border-radius:6px;padding:6px 10px}
.card .info-item .key{font-size:.7rem;color:#64748b}
.card .info-item .val{font-size:.9rem;font-weight:600;color:#e2e8f0}
.price{font-size:1.4rem;font-weight:700;color:#3b82f6;margin-bottom:4px}
.budget-ok{color:#4ade80}
  .budget-hoog{color:#f87171}
  .budget-neutraal{color:#fbbf24}
  .rating{font-size:.75rem;margin-bottom:12px}
.rating.good{color:#4ade80}
.rating.fair{color:#fbbf24}
.rating.high{color:#f87171}
.cta{display:block;text-align:center;background:#3b82f6;color:#fff;padding:8px;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600}
.cta:hover{background:#2563eb}
  .empty{text-align:center;padding:60px;color:#64748b;grid-column:1/-1}
.updated{font-size:.75rem;color:#64748b;padding:0 24px 8px}
</style>
  </head>
  <body>
  <div class="header">
  <h1>Ignis Inkoop Dashboard</h1>
<span id="count">0 auto's</span>
  </div>
  <div class="controls">
  <input id="search" placeholder="Zoek op locatie, verkoper..." oninput="render()">
  <select id="sort" onchange="render()">
  <option value="price_asc">Prijs laag-hoog</option>
  <option value="price_desc">Prijs hoog-laag</option>
  <option value="km_asc">KM laag-hoog</option>
  <option value="year_desc">Bouwjaar nieuw-oud</option>
  <option value="nieuw">Nieuwste eerst</option>
  </select>
  <select id="filter_btw" onchange="render()">
  <option value="all">Alle BTW/Marge</option>
  <option value="marge">Alleen Marge</option>
  <option value="btw">Alleen BTW</option>
  </select>
  <select id="filter_schade" onchange="render()">
  <option value="all">Met en zonder schade</option>
  <option value="geen">Geen schade</option>
  </select>
  </div>
  <div class="stats">
  <div class="stat"><div class="num" id="s_total">0</div><div class="lbl">Totaal</div></div>
  <div class="stat"><div class="num" id="s_nieuw">0</div><div class="lbl">Nieuw vandaag</div></div>
  <div class="stat"><div class="num" id="s_marge">0</div><div class="lbl">Marge auto's</div></div>
  <div class="stat"><div class="num" id="s_budget">0</div><div class="lbl">Binnen budget</div></div>
  </div>
  <p class="updated" id="updated">Dashboard gereed - nog geen auto's geladen.</p>
  <div class="grid" id="grid"><div class="empty">Nog geen auto's. Vraag Claude om te verversen!</div></div>
  <script>
  var CARS=[];
function budgetCheck(c){var yr=parseInt((c.fr||'').split('/').pop()||0),p=c.price||0;if(yr>=2023)return p>=14000&&p<=20000?'ok':p<14000?'neutraal':'hoog';if(yr>=2020)return p>=12000&&p<=16000?'ok':p<12000?'neutraal':'hoog';if(yr>=2017)return p>=7000&&p<=12000?'ok':p<7000?'neutraal':'hoog';return'neutraal';}
function budgetLabel(c){var b=budgetCheck(c);return b==='ok'?'<span class="budget-ok">binnen budget</span>':b==='hoog'?'<span class="budget-hoog">boven budget</span>':'<span class="budget-neutraal">onder budget</span>';}
function render(){var q=(document.getElementById('search').value||'').toLowerCase(),sort=document.getElementById('sort').value,fbtw=document.getElementById('filter_btw').value,fschade=document.getElementById('filter_schade').value,cars=CARS.slice();if(q)cars=cars.filter(function(c){return(c.loc+c.seller+c.sub+c.fr).toLowerCase().indexOf(q)>=0;});if(fbtw==='marge')cars=cars.filter(function(c){return!c.btw;});if(fbtw==='btw')cars=cars.filter(function(c){return c.btw;});if(fschade==='geen')cars=cars.filter(function(c){return!c.schade;});if(sort==='price_asc')cars.sort(function(a,b){return a.price-b.price;});else if(sort==='price_desc')cars.sort(function(a,b){return b.price-a.price;});else if(sort==='km_asc')cars.sort(function(a,b){return a.km-b.km;});else if(sort==='year_desc')cars.sort(function(a,b){return parseInt((b.fr||'0').split('/').pop()||0)-parseInt((a.fr||'0').split('/').pop()||0);});else if(sort==='nieuw')cars.sort(function(a,b){return(b.nieuw?1:0)-(a.nieuw?1:0);});document.getElementById('count').textContent=cars.length+" auto's";document.getElementById('s_total').textContent=CARS.length;document.getElementById('s_nieuw').textContent=CARS.filter(function(c){return c.nieuw;}).length;document.getElementById('s_marge').textContent=CARS.filter(function(c){return!c.btw;}).length;document.getElementById('s_budget').textContent=CARS.filter(function(c){return budgetCheck(c)==='ok';}).length;var grid=document.getElementById('grid');if(!cars.length){grid.innerHTML='<div class="empty">Geen resultaten</div>';return;}grid.innerHTML=cars.map(function(c){var tags=[];if(c.nieuw)tags.push('<span class="tag nieuw">NIEUW</span>');if(c.schade)tags.push('<span class="tag schade">SCHADE</span>');if(c.btw)tags.push('<span class="tag btw">BTW</span>');else tags.push('<span class="tag marge">MARGE</span>');if(c.sellerType==='Particulier')tags.push('<span class="tag particulier">Particulier</span>');else tags.push('<span class="tag dealer">Dealer</span>');var rc=c.rating==='good'?'good':c.rating==='fair'?'fair':'high';return'<div class="card"><div class="tags">'+tags.join('')+'</div><div class="price">EUR '+((c.price||0).toLocaleString('nl-NL'))+' '+budgetLabel(c)+'</div><h3>'+(c.sub||'Suzuki Ignis')+'</h3><div class="sub">'+(c.seller||'')+' - '+(c.loc||'')+'</div><div class="info"><div class="info-item"><div class="key">Bouwjaar</div><div class="val">'+(c.fr||'-')+'</div></div><div class="info-item"><div class="key">Kilometerstand</div><div class="val">'+((c.km||0).toLocaleString('nl-NL'))+' km</div></div></div><div class="rating '+rc+'">'+(c.ratingLabel||'')+'</div><a class="cta" href="https://suchen.mobile.de/auto/details.html?id='+c.id+'" target="_blank">Bekijk advertentie</a></div>';}).join('');}
  render();
</script>
  </body>
  </html>
