<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ignis Dashboard</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}.header{background:#1e293b;padding:20px 24px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:12px}.header h1{font-size:1.4rem;font-weight:700;color:#f1f5f9}.header span{background:#3b82f6;color:#fff;font-size:.75rem;padding:3px 10px;border-radius:99px}.controls{padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}.controls input,.controls select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:.9rem}.controls input{flex:1;min-width:200px}.stats{padding:16px 24px;display:flex;gap:16px;flex-wrap:wrap}.stat{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 20px;text-align:center}.stat .num{font-size:1.6rem;font-weight:700;color:#3b82f6}.stat .lbl{font-size:.75rem;color:#94a3b8;margin-top:2px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:0 24px 24px}.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;transition:border-color .2s;position:relative}.card:hover{border-color:#3b82f6}.card.nieuw-card{border:2px solid #f59e0b!important}.card.schade-card{border:2px solid #dc2626!important}.nieuw-badge{position:absolute;top:-1px;right:12px;background:#f59e0b;color:#000;font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:0 0 6px 6px;letter-spacing:.5px}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;margin-top:8px}.tag{font-size:.7rem;padding:3px 8px;border-radius:99px;font-weight:600}.tag.schade{background:#dc2626;color:#fff}.tag.marge{background:#1e3a5f;color:#93c5fd}.tag.particulier{background:#064e3b;color:#6ee7b7}.tag.dealer{background:#1c1917;color:#a8a29e}.tag.binnen{background:#166534;color:#bbf7d0}.tag.onder{background:#713f12;color:#fde68a}.tag.boven{background:#450a0a;color:#fca5a5}.schade-banner{background:rgba(220,38,38,.15);border:1px solid #dc2626;color:#fca5a5;padding:8px 12px;border-radius:8px;font-size:.8rem;font-weight:600;margin-bottom:10px}.card h3{font-size:.95rem;font-weight:600;color:#f1f5f9;margin-bottom:3px}.card-sub{font-size:.78rem;color:#94a3b8;margin-bottom:10px}.info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}.info-item{background:#0f172a;border-radius:6px;padding:6px 10px}.info-item .key{font-size:.7rem;color:#64748b}.info-item .val{font-size:.9rem;font-weight:600;color:#e2e8f0}.price{font-size:1.3rem;font-weight:700;color:#3b82f6;margin-bottom:6px}.advert-date{font-size:.72rem;color:#64748b;margin-bottom:8px}.advert-date.recent{color:#f59e0b;font-weight:600}.rat{font-size:.75rem;margin-bottom:12px}.rat.good{color:#4ade80}.rat.fair{color:#fbbf24}.rat.high{color:#f87171}.cta{display:block;text-align:center;background:#3b82f6;color:#fff;padding:8px;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600}.cta:hover{background:#2563eb}.empty{text-align:center;padding:60px;color:#64748b;grid-column:1/-1}.upd{font-size:.75rem;color:#64748b;padding:4px 24px 8px}</style>
</head><body>
<div class="header"><h1>Ignis Inkoop Dashboard</h1><span id="cnt">0</span></div>
<div class="controls"><input id="q" placeholder="Zoek op locatie, verkoper..." oninput="render()"><select id="fbtw" onchange="render()"><option value="all">Alle BTW/Marge</option><option value="marge">Alleen Marge</option><option value="btw">Alleen BTW</option></select><select id="fsch" onchange="render()"><option value="all">Met en zonder schade</option><option value="geen">Geen schade</option><option value="alleen">Alleen schade</option></select></div>
<div class="stats"><div class="stat"><div class="num" id="sT">0</div><div class="lbl">Totaal</div></div><div class="stat"><div class="num" id="sN" style="color:#f59e0b">0</div><div class="lbl">Nieuw</div></div><div class="stat"><div class="num" id="sS" style="color:#f87171">0</div><div class="lbl">Met schade</div></div><div class="stat"><div class="num" id="sB">0</div><div class="lbl">Binnen budget</div></div></div>
<p class="upd">Bijgewerkt: 25-6-2026 — 2017+ | max 110.000 km | onder → binnen → boven budget</p>
<div class="grid" id="grid"></div>
<script>
var CARS=[];
function bc(c){var y=parseInt((c.fr||'').split('/').pop()||0),p=c.price||0;if(y>=2023)return p>=14000&&p<=20000?'binnen':p<14000?'onder':'boven';if(y>=2020)return p>=12000&&p<=16000?'binnen':p<12000?'onder':'boven';if(y>=2017)return p>=7000&&p<=12000?'binnen':p<7000?'onder':'boven';return'boven';}
function bs(c){var b=bc(c);return b==='onder'?0:b==='binnen'?1:2;}
function datum(d){var dt=new Date();dt.setDate(dt.getDate()-d);return dt.toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit',year:'numeric'});}
function render(){
  var q=(document.getElementById('q').value||'').toLowerCase(),fbtw=document.getElementById('fbtw').value,fsch=document.getElementById('fsch').value;
  var cars=CARS.slice();
  if(q)cars=cars.filter(function(c){return((c.loc||'')+(c.seller||'')+(c.sub||'')+(c.fr||'')).toLowerCase().indexOf(q)>=0;});
  if(fbtw==='marge')cars=cars.filter(function(c){return!c.btw;});
  if(fbtw==='btw')cars=cars.filter(function(c){return c.btw;});
  if(fsch==='geen')cars=cars.filter(function(c){return!c.schade;});
  else if(fsch==='alleen')cars=cars.filter(function(c){return c.schade;});
  cars.sort(function(a,b){var d=bs(a)-bs(b);if(d!==0)return d;return a.daysOnline-b.daysOnline;});
  document.getElementById('cnt').textContent=cars.length+' autos';
  document.getElementById('sT').textContent=CARS.length;
  document.getElementById('sN').textContent=CARS.filter(function(c){return c.isNew;}).length;
  document.getElementById('sS').textContent=CARS.filter(function(c){return c.schade;}).length;
  document.getElementById('sB').textContent=CARS.filter(function(c){return bc(c)==='binnen';}).length;
  var g=document.getElementById('grid');
  if(!cars.length){g.innerHTML='<div class="empty">Geen resultaten</div>';return;}
  g.innerHTML=cars.map(function(c){
    var b=bc(c),tags=[];
    if(c.schade)tags.push('<span class="tag schade">SCHADE</span>');
    if(b==='onder')tags.push('<span class="tag onder">Onder budget</span>');
    else if(b==='binnen')tags.push('<span class="tag binnen">Binnen budget</span>');
    else tags.push('<span class="tag boven">Boven budget</span>');
    tags.push(c.btw?'<span class="tag btw">BTW</span>':'<span class="tag marge">MARGE</span>');
    tags.push(c.sellerType==='Particulier'?'<span class="tag particulier">Particulier</span>':'<span class="tag dealer">Dealer</span>');
    var rc=c.rating==='good'?'good':c.rating==='fair'?'fair':'high';
    var sb=c.schade?'<div class="schade-banner">LET OP: Deze auto heeft schade</div>':'';
    var badge=c.isNew?'<div class="nieuw-badge">NIEUW</div>':'';
    var recent=c.daysOnline<=7;
    var dateStr=datum(c.daysOnline);
    var dateHtml='<div class="advert-date'+(recent?' recent':'')+'">Geplaatst: '+dateStr+(recent?' ('+c.daysOnline+' dag'+(c.daysOnline===1?'':'en')+' geleden)':'')+'</div>';
    return '<div class="card'+(c.isNew?' nieuw-card':'')+(c.schade?' schade-card':'')+'">'+badge+
      '<div class="tags">'+tags.join('')+'</div>'+sb+
      '<div class="price">EUR '+((c.price||0).toLocaleString('nl-NL'))+'</div>'+
      dateHtml+
      '<h3>'+(c.sub||'Suzuki Ignis')+'</h3>'+
      '<div class="card-sub">'+(c.seller||'-')+' — '+(c.loc||'-')+'</div>'+
      '<div class="info"><div class="info-item"><div class="key">Bouwjaar</div><div class="val">'+(c.fr||'-')+'</div></div>'+
      '<div class="info-item"><div class="key">Kilometerstand</div><div class="val">'+((c.km||0).toLocaleString('nl-NL'))+' km</div></div></div>'+
      '<div class="rat '+rc+'">'+(c.ratingLabel||'')+'</div>'+
      '<a class="cta" href="https://suchen.mobile.de/fahrzeuge/details.html?id='+c.id+'" target="_blank">Bekijk advertentie</a></div>';
  }).join('');
}
render();
</script></body></html>
