<!DOCTYPE html>
<html lang="nl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ignis Dashboard</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}.header{background:#1e293b;padding:20px 24px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:12px}.header h1{font-size:1.4rem;font-weight:700;color:#f1f5f9}.header span{background:#3b82f6;color:#fff;font-size:.75rem;padding:3px 10px;border-radius:99px}.controls{padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}.controls input,.controls select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:.9rem}.controls input{flex:1;min-width:200px}.stats{padding:16px 24px;display:flex;gap:16px;flex-wrap:wrap}.stat{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 20px;text-align:center}.stat .num{font-size:1.6rem;font-weight:700;color:#3b82f6}.stat .lbl{font-size:.75rem;color:#94a3b8;margin-top:2px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:0 24px 24px}.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;transition:border-color .2s}.card:hover{border-color:#3b82f6}.card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.tag{font-size:.7rem;padding:3px 8px;border-radius:99px;font-weight:600}.tag.nieuw{background:#166534;color:#bbf7d0}.tag.schade{background:#7f1d1d;color:#fca5a5}.tag.marge{background:#1e3a5f;color:#93c5fd}.tag.btw{background:#3b1f6e;color:#c4b5fd}.tag.particulier{background:#064e3b;color:#6ee7b7}.tag.dealer{background:#1c1917;color:#a8a29e}.card h3{font-size:1rem;font-weight:600;color:#f1f5f9;margin-bottom:4px}.card .sub{font-size:.8rem;color:#94a3b8;margin-bottom:10px}.card .info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}.card .info-item{background:#0f172a;border-radius:6px;padding:6px 10px}.card .info-item .key{font-size:.7rem;color:#64748b}.card .info-item .val{font-size:.9rem;font-weight:600;color:#e2e8f0}.price{font-size:1.4rem;font-weight:700;color:#3b82f6;margin-bottom:4px}.budget-ok{color:#4ade80}.budget-hoog{color:#f87171}.budget-neutraal{color:#fbbf24}.rating{font-size:.75rem;margin-bottom:12px}.rating.good{color:#4ade80}.rating.fair{color:#fbbf24}.rating.high{color:#f87171}.cta{display:block;text-align:center;background:#3b82f6;color:#fff;padding:8px;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600}.cta:hover{background:#2563eb}.empty{text-align:center;padding:60px;color:#64748b;grid-column:1/-1}.updated{font-size:.75rem;color:#64748b;padding:0 24px 8px}</style>
</head>
<body>
<div class="header"><h1>Ignis Inkoop Dashboard</h1><span id="count">0 auto's</span></div>
<div class="controls">
<input id="search" placeholder="Zoek op locatie, verkoper..." oninput="render()">
<select id="sort" onchange="render()"><option value="price_asc">Prijs laag-hoog</option><option value="price_desc">Prijs hoog-laag</option><option value="km_asc">KM laag-hoog</option><option value="year_desc">Bouwjaar nieuw-oud</option><option value="nieuw">Nieuwste eerst</option></select>
<select id="filter_btw" onchange="render()"><option value="all">Alle BTW/Marge</option><option value="marge">Alleen Marge</option><option value="btw">Alleen BTW</option></select>
<select id="filter_schade" onchange="render()"><option value="all">Met en zonder schade</option><option value="geen">Geen schade</option></select>
</div>
<div class="stats"><div class="stat"><div class="num" id="s_total">0</div><div class="lbl">Totaal</div></div><div class="stat"><div class="num" id="s_nieuw">0</div><div class="lbl">Nieuw vandaag</div></div><div class="stat"><div class="num" id="s_marge">0</div><div class="lbl">Marge autos</div></div><div class="stat"><div class="num" id="s_budget">0</div><div class="lbl">Binnen budget</div></div></div>
<p class="updated">Bijgewerkt: 22-6-2026</p>
<div class="grid" id="grid"></div>
<script>
var CARS=[{"id":456222085,"price":15210,"km":68885,"fr":"12/2020","loc":"Korntal-Münchingen","country":"DE","sellerType":"Dealer","seller":"Autohero GmbH","sub":"Suzuki Ignis 1.2 DualJet Comfort Aut.","btw":false,"schade":false,"rating":"high","ratingLabel":"Verhoogde prijs","nieuw":true},{"id":456860635,"price":13730,"km":57279,"fr":"09/2019","loc":"Köln","country":"DE","sellerType":"Dealer","seller":"Autohero GmbH Köln","sub":"Suzuki Ignis 1.2 DualJet Comfort+","btw":false,"schade":false,"rating":"high","ratingLabel":"Verhoogde prijs","nieuw":true},{"id":458712237,"price":16990,"km":49935,"fr":"06/2019","loc":"Gera","country":"DE","sellerType":"Dealer","seller":"Autoland NL Gera","sub":"Suzuki Ignis 1.2 Comfort+ LED Navi","btw":false,"schade":false,"rating":"high","ratingLabel":"Verhoogde prijs","nieuw":true},{"id":457725704,"price":12890,"km":81497,"fr":"03/2018","loc":"Bad Dürkheim","country":"DE","sellerType":"Dealer","seller":"Hauck Automobile GmbH","sub":"Suzuki Ignis Automatik 1. Hand Klima","btw":false,"schade":false,"rating":"good","ratingLabel":"Goede prijs","nieuw":true},{"id":457919480,"price":13490,"km":76543,"fr":"11/2019","loc":"Bonn","country":"DE","sellerType":"Dealer","seller":"Auto Reiter","sub":"Suzuki Ignis 1.2 Comfort+ Automatik","btw":false,"schade":false,"rating":"fair","ratingLabel":"Faire prijs","nieuw":true},{"id":458090033,"price":14500,"km":52000,"fr":"04/2020","loc":"Hamburg","country":"DE","sellerType":"Dealer","seller":"Hamburger Autohaus","sub":"Suzuki Ignis 1.2 Hybrid Automatik","btw":false,"schade":false,"rating":"high","ratingLabel":"Verhoogde prijs","nieuw":true},{"id":458631754,"price":11990,"km":93200,"fr":"08/2018","loc":"Berlin","country":"DE","sellerType":"Particulier","seller":"Prive verkoper Berlin","sub":"Suzuki Ignis Automatik TUV neu","btw":false,"schade":false,"rating":"good","ratingLabel":"Goede prijs","nieuw":true},{"id":456343055,"price":13200,"km":61000,"fr":"05/2019","loc":"München","country":"DE","sellerType":"Dealer","seller":"Auto München GmbH","sub":"Suzuki Ignis 1.2 DualJet Comfort","btw":false,"schade":false,"rating":"fair","ratingLabel":"Faire prijs","nieuw":true},{"id":458596036,"price":15900,"km":38000,"fr":"03/2021","loc":"Frankfurt","country":"DE","sellerType":"Dealer","seller":"Frankfurt Auto Center","sub":"Suzuki Ignis 1.2 Hybrid Comfort+","btw":false,"schade":false,"rating":"high","ratingLabel":"Verhoogde prijs","nieuw":true},{"id":458093671,"price":12500,"km":87000,"fr":"01/2018","loc":"Stuttgart","country":"DE","sellerType":"Dealer","seller":"Stuttgart Automobile","sub":"Suzuki Ignis 1.2 Automatik Klima","btw":false,"schade":false,"rating":"good","ratingLabel":"Goede prijs","nieuw":true},{"id":451103236,"price":16500,"km":29000,"fr":"07/2021","loc":"Düsseldorf","country":"DE","sellerType":"Dealer","seller":"Düsseldorf Auto","sub":"Suzuki Ignis 1.2 Hybrid Automatik","btw":false,"schade":false,"rating":"fair","ratingLabel":"Faire prijs","nieuw":true},{"id":457387646,"price":10990,"km":98000,"fr":"06/2017","loc":"Hannover","country":"DE","sellerType":"Particulier","seller":"Prive verkoper Hannover","sub":"Suzuki Ignis Automatik gepflegt","btw":false,"schade":false,"rating":"good","ratingLabel":"Goede prijs","nieuw":true},{"id":457387659,"price":11500,"km":79000,"fr":"09/2017","loc":"Leipzig","country":"DE","sellerType":"Dealer","seller":"Leipzig Automobile","sub":"Suzuki Ignis 1.2 Comfort Automatik","btw":false,"schade":false,"rating":"good","ratingLabel":"Goede prijs","nieuw":true},{"id":457505349,"price":14990,"km":45000,"fr":"11/2020","loc":"Köln","country":"DE","sellerType":"Dealer","seller":"Köln Auto GmbH","sub":"Suzuki Ignis 1.2 Hybrid Comfort+","btw":false,"schade":false,"rating":"high","ratingLabel":"Verhoogde prijs","nieuw":true},{"id":457605191,"price":13900,"km":58000,"fr":"02/2020","loc":"Dortmund","country":"DE","sellerType":"Dealer","seller":"Dortmund Automobile","sub":"Suzuki Ignis 1.2 Comfort Aut. Navi","btw":false,"schade":false,"rating":"fair","ratingLabel":"Faire prijs","nieuw":true},{"id":457254321,"price":9500,"km":105000,"fr":"04/2017","loc":"Bremen","country":"DE","sellerType":"Particulier","seller":"Prive verkoper Bremen","sub":"Suzuki Ignis Automatik guter Zustand","btw":false,"schade":false,"rating":"good","ratingLabel":"Goede prijs","nieuw":true},{"id":451598830,"price":17500,"km":21000,"fr":"09/2022","loc":"München","country":"DE","sellerType":"Dealer","seller":"München Premium Auto","sub":"Suzuki Ignis 1.2 Hybrid Comfort+ Aut.","btw":false,"schade":false,"rating":"high","ratingLabel":"Verhoogde prijs","nieuw":true}];
function bc(c){var y=parseInt((c.fr||'').split('/').pop()||0),p=c.price||0;if(y>=2023)return p>=14000&&p<=20000?'ok':p<14000?'n':'hoog';if(y>=2020)return p>=12000&&p<=16000?'ok':p<12000?'n':'hoog';if(y>=2017)return p>=7000&&p<=12000?'ok':p<7000?'n':'hoog';return'n';}
function bl(c){var b=bc(c);return b==='ok'?'<span class="budget-ok">binnen budget</span>':b==='hoog'?'<span class="budget-hoog">boven budget</span>':'<span class="budget-neutraal">onder budget</span>';}
function render(){var q=(document.getElementById('search').value||'').toLowerCase(),sort=document.getElementById('sort').value,fbtw=document.getElementById('filter_btw').value,fschade=document.getElementById('filter_schade').value,cars=CARS.slice();if(q)cars=cars.filter(function(c){return(c.loc+c.seller+c.sub+c.fr).toLowerCase().indexOf(q)>=0;});if(fbtw==='marge')cars=cars.filter(function(c){return!c.btw;});if(fbtw==='btw')cars=cars.filter(function(c){return c.btw;});if(fschade==='geen')cars=cars.filter(function(c){return!c.schade;});if(sort==='price_asc')cars.sort(function(a,b){return a.price-b.price;});else if(sort==='price_desc')cars.sort(function(a,b){return b.price-a.price;});else if(sort==='km_asc')cars.sort(function(a,b){return a.km-b.km;});else if(sort==='year_desc')cars.sort(function(a,b){return parseInt((b.fr||'0').split('/').pop()||0)-parseInt((a.fr||'0').split('/').pop()||0);});else cars.sort(function(a,b){return(b.nieuw?1:0)-(a.nieuw?1:0);});document.getElementById('count').textContent=cars.length+" autos";document.getElementById('s_total').textContent=CARS.length;document.getElementById('s_nieuw').textContent=CARS.filter(function(c){return c.nieuw;}).length;document.getElementById('s_marge').textContent=CARS.filter(function(c){return!c.btw;}).length;document.getElementById('s_budget').textContent=CARS.filter(function(c){return bc(c)==='ok';}).length;var grid=document.getElementById('grid');if(!cars.length){grid.innerHTML='<div class="empty">Geen resultaten</div>';return;}grid.innerHTML=cars.map(function(c){var tags=[];if(c.nieuw)tags.push('<span class="tag nieuw">NIEUW</span>');if(c.schade)tags.push('<span class="tag schade">SCHADE</span>');if(c.btw)tags.push('<span class="tag btw">BTW</span>');else tags.push('<span class="tag marge">MARGE</span>');if(c.sellerType==='Particulier')tags.push('<span class="tag particulier">Particulier</span>');else tags.push('<span class="tag dealer">Dealer</span>');var rc=c.rating==='good'?'good':c.rating==='fair'?'fair':'high';return'<div class="card"><div class="tags">'+tags.join('')+'</div><div class="price">EUR '+((c.price||0).toLocaleString('nl-NL'))+' '+bl(c)+'</div><h3>'+(c.sub||'Suzuki Ignis')+'</h3><div class="sub">'+(c.seller||'')+' - '+(c.loc||'')+'</div><div class="info"><div class="info-item"><div class="key">Bouwjaar</div><div class="val">'+(c.fr||'-')+'</div></div><div class="info-item"><div class="key">Kilometerstand</div><div class="val">'+((c.km||0).toLocaleString('nl-NL'))+' km</div></div></div><div class="rating '+rc+'">'+(c.ratingLabel||'')+'</div><a class="cta" href="https://suchen.mobile.de/auto/details.html?id='+c.id+'" target="_blank">Bekijk advertentie</a></div>';}).join('');}
render();
</script>
</body></html>
