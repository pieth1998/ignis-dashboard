function bc(c){var y=parseInt((c.fr||'').split('/').pop()||0),p=c.price||0;if(y>=2023)return p>=14000&&p<=20000?'ok':p<14000?'n':'hoog';if(y>=2020)return p>=12000&&p<=16000?'ok':p<12000?'n':'hoog';if(y>=2017)return p>=7000&&p<=12000?'ok':p<7000?'n':'hoog';return'n';}
function bl(c){var b=bc(c);return b==='ok'?'<span class="budget-ok">binnen budget</span>':b==='hoog'?'<span class="budget-hoog">boven budget</span>':'<span class="budget-neutraal">onder budget</span>';}
function render(){var q=(document.getElementById('search').value||'').toLowerCase(),sort=document.getElementById('sort').value,fbtw=document.getElementById('filter_btw').value,fschade=document.getElementById('filter_schade').value,cars=CARS.filter(function(c){return!c.seller.toLowerCase().includes("autohero");});if(q)cars=cars.filter(function(c){return(c.loc+c.seller+c.sub+c.fr).toLowerCase().indexOf(q)>=0;});if(fbtw==='marge')cars=cars.filter(function(c){return!c.btw;});if(fbtw==='btw')cars=cars.filter(function(c){return c.btw;});if(fschade==='geen')cars=cars.filter(function(c){return!c.schade;});else if(fschade==='alleen')cars=cars.filter(function(c){return c.schade;});if(sort==='price_asc')cars.sort(function(a,b){return a.price-b.price;});else if(sort==='price_desc')cars.sort(function(a,b){return b.price-a.price;});else if(sort==='km_asc')cars.sort(function(a,b){return a.km-b.km;});else if(sort==='year_desc')cars.sort(function(a,b){return parseInt((b.fr||'0').split('/').pop()||0)-parseInt((a.fr||'0').split('/').pop()||0);});document.getElementById('count').textContent=cars.length+" autos";document.getElementById('s_total').textContent=CARS.length;document.getElementById('s_schade').textContent=CARS.filter(function(c){return c.schade;}).length;document.getElementById('s_marge').textContent=CARS.filter(function(c){return!c.btw;}).length;document.getElementById('s_budget').textContent=CARS.filter(function(c){return bc(c)==='ok';}).length;var grid=document.getElementById('grid');if(!cars.length){grid.innerHTML='<div class="empty">Geen resultaten</div>';return;}grid.innerHTML=cars.map(function(c){var tags=[];if(c.schade)tags.push('<span class="tag schade">SCHADE</span>');tags.push(c.btw?'<span class="tag btw">BTW</span>':'<span class="tag marge">MARGE</span>');tags.push(c.sellerType==='Particulier'?'<span class="tag particulier">Particulier</span>':'<span class="tag dealer">Dealer</span>');var rc=c.rating==='good'?'good':c.rating==='fair'?'fair':'high';var sb=c.schade?'<div class="schade-banner">SCHADE ADVERTENTIE - Controleer details voor aankoop</div>':'';return'<div class="card'+(c.schade?' schade-card':'')+'"><div class="tags">'+tags.join('')+'</div>'+sb+'<div class="price">EUR '+((c.price||0).toLocaleString('nl-NL'))+' '+bl(c)+'</div><h3>'+(c.sub||'Suzuki Ignis')+'</h3><div class="sub">'+(c.seller||'')+' - '+(c.loc||'')+'</div><div class="info"><div class="info-item"><div class="key">Bouwjaar</div><div class="val">'+(c.fr||'-')+'</div></div><div class="info-item"><div class="key">Kilometerstand</div><div class="val">'+((c.km||0).toLocaleString('nl-NL'))+' km</div></div></div><div class="rating '+rc+'">'+(c.ratingLabel||'')+'</div><a class="cta" href="https://suchen.mobile.de/fahrzeuge/details.html?id='+c.id+'" target="_blank">Bekijk advertentie</a></div>';}).join('');}
